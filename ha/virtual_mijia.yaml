rest_command:
  virtual_mijia_update:
    url: "http://127.0.0.1:8787/api/devices/{{ device_id }}"
    method: post
    content_type: "application/x-www-form-urlencoded"
    payload: >-
      on={{ on | default('') }}&brightness={{ brightness | default('') }}&volume={{ volume | default('') }}&temperature={{ temperature | default('') }}&color={{ color | default('') | urlencode }}&speed={{ speed | default('') }}&mode={{ mode | default('') | urlencode }}&note={{ note | default('') | urlencode }}

input_boolean:
  virtual_mijia_desk_lamp_power:
    name: 米家台灯电源
  virtual_mijia_air_purifier_power:
    name: 米家空气净化器电源
  virtual_mijia_tv_power:
    name: 米家电视电源
  virtual_mijia_ac_companion_power:
    name: 米家空调伴侣电源
  virtual_mijia_xiaoai_scene_power:
    name: 小爱音箱场景
  virtual_mijia_sync_guard:
    name: 米家同步锁
    initial: off

input_number:
  virtual_mijia_desk_lamp_brightness:
    name: 米家台灯亮度
    min: 0
    max: 100
    step: 1
    mode: slider
    initial: 65
  virtual_mijia_air_purifier_speed:
    name: 米家空气净化器风速
    min: 0
    max: 100
    step: 5
    mode: slider
    initial: 35
  virtual_mijia_tv_volume:
    name: 米家电视音量
    min: 0
    max: 100
    step: 1
    mode: slider
    initial: 35
  virtual_mijia_ac_temperature:
    name: 米家空调伴侣温度
    min: 16
    max: 30
    step: 1
    mode: box
    initial: 24
  virtual_mijia_ac_fan_speed:
    name: 米家空调伴侣风量
    min: 0
    max: 100
    step: 5
    mode: slider
    initial: 45

input_select:
  virtual_mijia_desk_lamp_color:
    name: 米家台灯颜色
    options:
      - warm
      - white
      - night
    initial: warm
  virtual_mijia_ac_mode:
    name: 米家空调伴侣模式
    options:
      - cool
      - heat
      - dry
      - fan
      - auto
    initial: cool

template:
  - light:
      - name: 米家台灯
        unique_id: virtual_mijia_desk_lamp
        default_entity_id: light.virtual_mijia_desk_lamp
        state: "{{ is_state('input_boolean.virtual_mijia_desk_lamp_power', 'on') }}"
        level: "{{ (states('input_number.virtual_mijia_desk_lamp_brightness') | int(0) * 255 / 100) | int }}"
        turn_on:
          - service: input_boolean.turn_on
            target:
              entity_id: input_boolean.virtual_mijia_desk_lamp_power
        turn_off:
          - service: input_boolean.turn_off
            target:
              entity_id: input_boolean.virtual_mijia_desk_lamp_power
        set_level:
          - service: input_number.set_value
            target:
              entity_id: input_number.virtual_mijia_desk_lamp_brightness
            data:
              value: "{{ (brightness | int(0) * 100 / 255) | round(0) }}"
  - fan:
      - name: 米家空气净化器
        unique_id: virtual_mijia_air_purifier
        default_entity_id: fan.virtual_mijia_air_purifier
        state: "{{ is_state('input_boolean.virtual_mijia_air_purifier_power', 'on') }}"
        speed_count: 5
        percentage: "{{ states('input_number.virtual_mijia_air_purifier_speed') | int(0) if is_state('input_boolean.virtual_mijia_air_purifier_power', 'on') else 0 }}"
        turn_on:
          - service: input_boolean.turn_on
            target:
              entity_id: input_boolean.virtual_mijia_air_purifier_power
        turn_off:
          - service: input_boolean.turn_off
            target:
              entity_id: input_boolean.virtual_mijia_air_purifier_power
        set_percentage:
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ percentage | int(0) > 0 }}"
                sequence:
                  - service: input_boolean.turn_on
                    target:
                      entity_id: input_boolean.virtual_mijia_air_purifier_power
            default:
              - service: input_boolean.turn_off
                target:
                  entity_id: input_boolean.virtual_mijia_air_purifier_power
          - service: input_number.set_value
            target:
              entity_id: input_number.virtual_mijia_air_purifier_speed
            data:
              value: "{{ percentage | int(0) }}"
  - switch:
      - name: 米家电视
        unique_id: virtual_mijia_tv
        default_entity_id: switch.virtual_mijia_tv
        state: "{{ is_state('input_boolean.virtual_mijia_tv_power', 'on') }}"
        turn_on:
          - service: input_boolean.turn_on
            target:
              entity_id: input_boolean.virtual_mijia_tv_power
        turn_off:
          - service: input_boolean.turn_off
            target:
              entity_id: input_boolean.virtual_mijia_tv_power
      - name: 米家空调伴侣
        unique_id: virtual_mijia_ac_companion
        default_entity_id: switch.virtual_mijia_ac_companion
        state: "{{ is_state('input_boolean.virtual_mijia_ac_companion_power', 'on') }}"
        turn_on:
          - service: input_boolean.turn_on
            target:
              entity_id: input_boolean.virtual_mijia_ac_companion_power
        turn_off:
          - service: input_boolean.turn_off
            target:
              entity_id: input_boolean.virtual_mijia_ac_companion_power
      - name: 小爱音箱场景
        unique_id: virtual_mijia_xiaoai_scene
        default_entity_id: switch.virtual_mijia_xiaoai_scene
        state: "{{ is_state('input_boolean.virtual_mijia_xiaoai_scene_power', 'on') }}"
        turn_on:
          - service: input_boolean.turn_on
            target:
              entity_id: input_boolean.virtual_mijia_xiaoai_scene_power
        turn_off:
          - service: input_boolean.turn_off
            target:
              entity_id: input_boolean.virtual_mijia_xiaoai_scene_power

automation:
  - alias: Virtual Mijia sync desk lamp to Rust bridge
    id: virtual_mijia_sync_desk_lamp
    mode: restart
    trigger:
      - platform: state
        entity_id:
          - input_boolean.virtual_mijia_desk_lamp_power
          - input_number.virtual_mijia_desk_lamp_brightness
          - input_select.virtual_mijia_desk_lamp_color
    condition:
      - condition: state
        entity_id: input_boolean.virtual_mijia_sync_guard
        state: "off"
    action:
      - service: rest_command.virtual_mijia_update
        data:
          device_id: desk_lamp
          on: "{{ is_state('input_boolean.virtual_mijia_desk_lamp_power', 'on') }}"
          brightness: "{{ states('input_number.virtual_mijia_desk_lamp_brightness') | int(0) }}"
          color: >-
            {% set map = {'warm':'#ffd36b','white':'#f8fafc','night':'#f97316'} %}
            {{ map[states('input_select.virtual_mijia_desk_lamp_color')] }}
          mode: "{{ states('input_select.virtual_mijia_desk_lamp_color') }}"
          note: HA 控制台灯
  - alias: Virtual Mijia sync purifier to Rust bridge
    id: virtual_mijia_sync_air_purifier
    mode: restart
    trigger:
      - platform: state
        entity_id:
          - input_boolean.virtual_mijia_air_purifier_power
          - input_number.virtual_mijia_air_purifier_speed
    condition:
      - condition: state
        entity_id: input_boolean.virtual_mijia_sync_guard
        state: "off"
    action:
      - service: rest_command.virtual_mijia_update
        data:
          device_id: air_purifier
          on: "{{ is_state('input_boolean.virtual_mijia_air_purifier_power', 'on') }}"
          speed: "{{ states('input_number.virtual_mijia_air_purifier_speed') | int(0) }}"
          mode: auto
          note: HA 控制空气净化器
  - alias: Virtual Mijia sync TV to Rust bridge
    id: virtual_mijia_sync_tv
    mode: restart
    trigger:
      - platform: state
        entity_id:
          - input_boolean.virtual_mijia_tv_power
          - input_number.virtual_mijia_tv_volume
    condition:
      - condition: state
        entity_id: input_boolean.virtual_mijia_sync_guard
        state: "off"
    action:
      - service: rest_command.virtual_mijia_update
        data:
          device_id: tv
          on: "{{ is_state('input_boolean.virtual_mijia_tv_power', 'on') }}"
          volume: "{{ states('input_number.virtual_mijia_tv_volume') | int(0) }}"
          brightness: "{{ states('input_number.virtual_mijia_tv_volume') | int(0) }}"
          mode: media
          note: HA 控制电视
  - alias: Virtual Mijia sync AC companion to Rust bridge
    id: virtual_mijia_sync_ac_companion
    mode: restart
    trigger:
      - platform: state
        entity_id:
          - input_boolean.virtual_mijia_ac_companion_power
          - input_number.virtual_mijia_ac_temperature
          - input_number.virtual_mijia_ac_fan_speed
          - input_select.virtual_mijia_ac_mode
    condition:
      - condition: state
        entity_id: input_boolean.virtual_mijia_sync_guard
        state: "off"
    action:
      - service: rest_command.virtual_mijia_update
        data:
          device_id: ac_companion
          on: "{{ is_state('input_boolean.virtual_mijia_ac_companion_power', 'on') }}"
          temperature: "{{ states('input_number.virtual_mijia_ac_temperature') | int(24) }}"
          brightness: "{{ states('input_number.virtual_mijia_ac_temperature') | int(24) }}"
          speed: "{{ states('input_number.virtual_mijia_ac_fan_speed') | int(0) }}"
          mode: "{{ states('input_select.virtual_mijia_ac_mode') }}"
          note: HA 控制空调伴侣
  - alias: Virtual Mijia sync Xiaoai scene to Rust bridge
    id: virtual_mijia_sync_xiaoai_scene
    mode: restart
    trigger:
      - platform: state
        entity_id:
          - input_boolean.virtual_mijia_xiaoai_scene_power
    condition:
      - condition: state
        entity_id: input_boolean.virtual_mijia_sync_guard
        state: "off"
    action:
      - service: rest_command.virtual_mijia_update
        data:
          device_id: xiaoai_scene
          on: "{{ is_state('input_boolean.virtual_mijia_xiaoai_scene_power', 'on') }}"
          brightness: "{{ 100 if is_state('input_boolean.virtual_mijia_xiaoai_scene_power', 'on') else 20 }}"
          mode: scene
          note: HA 控制小爱场景
  - alias: Virtual Mijia sync Rust dashboard to Home Assistant
    id: virtual_mijia_sync_rust_dashboard_to_ha
    mode: queued
    trigger:
      - platform: webhook
        webhook_id: virtual_mijia_bridge_state_b53b516a99ba5cf173601fd8ff7298e0
        allowed_methods:
          - POST
    variables:
      device_id: "{{ trigger.json.id | default('') }}"
      color_value: "{{ trigger.json.color | default('') }}"
      mode_value: "{{ trigger.json.mode | default('') }}"
      volume_value: "{{ trigger.json.volume | default(trigger.json.brightness | default(0)) }}"
      temperature_value: "{{ trigger.json.temperature | default(trigger.json.brightness | default(24)) }}"
    action:
      - service: input_boolean.turn_on
        target:
          entity_id: input_boolean.virtual_mijia_sync_guard
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ device_id == 'desk_lamp' }}"
            sequence:
              - choose:
                  - conditions:
                      - condition: template
                        value_template: "{{ trigger.json.on | default(false) == true }}"
                    sequence:
                      - service: input_boolean.turn_on
                        target:
                          entity_id: input_boolean.virtual_mijia_desk_lamp_power
                default:
                  - service: input_boolean.turn_off
                    target:
                      entity_id: input_boolean.virtual_mijia_desk_lamp_power
              - service: input_number.set_value
                target:
                  entity_id: input_number.virtual_mijia_desk_lamp_brightness
                data:
                  value: "{{ trigger.json.brightness | int(0) }}"
              - service: input_select.select_option
                target:
                  entity_id: input_select.virtual_mijia_desk_lamp_color
                data:
                  option: >-
                    {% if color_value == '#f8fafc' %}white
                    {% elif color_value == '#f97316' %}night
                    {% else %}warm
                    {% endif %}
          - conditions:
              - condition: template
                value_template: "{{ device_id == 'air_purifier' }}"
            sequence:
              - choose:
                  - conditions:
                      - condition: template
                        value_template: "{{ trigger.json.on | default(false) == true }}"
                    sequence:
                      - service: input_boolean.turn_on
                        target:
                          entity_id: input_boolean.virtual_mijia_air_purifier_power
                default:
                  - service: input_boolean.turn_off
                    target:
                      entity_id: input_boolean.virtual_mijia_air_purifier_power
              - service: input_number.set_value
                target:
                  entity_id: input_number.virtual_mijia_air_purifier_speed
                data:
                  value: "{{ trigger.json.speed | int(0) }}"
          - conditions:
              - condition: template
                value_template: "{{ device_id == 'tv' }}"
            sequence:
              - choose:
                  - conditions:
                      - condition: template
                        value_template: "{{ trigger.json.on | default(false) == true }}"
                    sequence:
                      - service: input_boolean.turn_on
                        target:
                          entity_id: input_boolean.virtual_mijia_tv_power
                default:
                  - service: input_boolean.turn_off
                    target:
                      entity_id: input_boolean.virtual_mijia_tv_power
              - service: input_number.set_value
                target:
                  entity_id: input_number.virtual_mijia_tv_volume
                data:
                  value: "{{ volume_value | int(0) }}"
          - conditions:
              - condition: template
                value_template: "{{ device_id == 'ac_companion' }}"
            sequence:
              - choose:
                  - conditions:
                      - condition: template
                        value_template: "{{ trigger.json.on | default(false) == true }}"
                    sequence:
                      - service: input_boolean.turn_on
                        target:
                          entity_id: input_boolean.virtual_mijia_ac_companion_power
                default:
                  - service: input_boolean.turn_off
                    target:
                      entity_id: input_boolean.virtual_mijia_ac_companion_power
              - service: input_number.set_value
                target:
                  entity_id: input_number.virtual_mijia_ac_temperature
                data:
                  value: "{{ temperature_value | int(24) }}"
              - service: input_number.set_value
                target:
                  entity_id: input_number.virtual_mijia_ac_fan_speed
                data:
                  value: "{{ trigger.json.speed | int(0) }}"
              - service: input_select.select_option
                target:
                  entity_id: input_select.virtual_mijia_ac_mode
                data:
                  option: >-
                    {% if mode_value in ['cool', 'heat', 'dry', 'fan', 'auto'] %}
                      {{ mode_value }}
                    {% else %}
                      cool
                    {% endif %}
          - conditions:
              - condition: template
                value_template: "{{ device_id == 'xiaoai_scene' }}"
            sequence:
              - choose:
                  - conditions:
                      - condition: template
                        value_template: "{{ trigger.json.on | default(false) == true }}"
                    sequence:
                      - service: input_boolean.turn_on
                        target:
                          entity_id: input_boolean.virtual_mijia_xiaoai_scene_power
                default:
                  - service: input_boolean.turn_off
                    target:
                      entity_id: input_boolean.virtual_mijia_xiaoai_scene_power
      - delay:
          seconds: 1
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.virtual_mijia_sync_guard

homekit:
  - name: HA Mijia Test
    port: 51827
    advertise_ip:
      - 192.168.3.37
    filter:
      include_entities:
        - light.virtual_mijia_desk_lamp
        - fan.virtual_mijia_air_purifier
        - switch.virtual_mijia_tv
        - input_number.virtual_mijia_tv_volume
        - switch.virtual_mijia_ac_companion
        - input_number.virtual_mijia_ac_temperature
        - switch.virtual_mijia_xiaoai_scene
    entity_config:
      fan.virtual_mijia_air_purifier:
        type: air_purifier
