rest_command:
  virtual_mijia_update:
    url: "http://127.0.0.1:8787/api/devices/{{ device_id }}"
    method: post
    content_type: "application/x-www-form-urlencoded"
    payload: >-
      on={{ on | default('') }}&brightness={{ brightness | default('') }}&color={{ color | default('') | urlencode }}&speed={{ speed | default('') }}&note={{ note | default('') | urlencode }}

input_boolean:
  virtual_mijia_desk_lamp_power:
    name: 虚拟米家台灯电源
  virtual_mijia_lightstrip_power:
    name: 虚拟米家灯带电源
  virtual_mijia_air_purifier_power:
    name: 虚拟米家空气净化器电源
  virtual_mijia_xiaoai_scene_power:
    name: 虚拟小爱音箱场景
  virtual_mijia_sync_guard:
    name: 虚拟米家同步锁
    initial: off

input_number:
  virtual_mijia_desk_lamp_brightness:
    name: 虚拟米家台灯亮度
    min: 0
    max: 100
    step: 1
    mode: slider
    initial: 65
  virtual_mijia_lightstrip_brightness:
    name: 虚拟米家灯带亮度
    min: 0
    max: 100
    step: 1
    mode: slider
    initial: 45
  virtual_mijia_air_purifier_speed:
    name: 虚拟米家空气净化器风速
    min: 0
    max: 100
    step: 5
    mode: slider
    initial: 35

input_select:
  virtual_mijia_desk_lamp_color:
    name: 虚拟米家台灯颜色
    options:
      - warm
      - white
      - night
    initial: warm
  virtual_mijia_lightstrip_color:
    name: 虚拟米家灯带颜色
    options:
      - cyan
      - purple
      - sunset
    initial: cyan

template:
  - light:
      - name: 虚拟米家台灯
        unique_id: virtual_mijia_desk_lamp
        default_entity_id: light.virtual_mijia_desk_lamp
        state: "{{ is_state('input_boolean.virtual_mijia_desk_lamp_power', 'on') }}"
        level: "{{ (states('input_number.virtual_mijia_desk_lamp_brightness') | int(0) * 255 / 100) | int }}"
        turn_on:
          - service: input_boolean.turn_on
            target:
              entity_id: input_boolean.virtual_mijia_desk_lamp_power
        turn_off:
          - service: input_boolean.turn_off
            target:
              entity_id: input_boolean.virtual_mijia_desk_lamp_power
        set_level:
          - service: input_number.set_value
            target:
              entity_id: input_number.virtual_mijia_desk_lamp_brightness
            data:
              value: "{{ (brightness | int(0) * 100 / 255) | round(0) }}"
      - name: 虚拟米家灯带
        unique_id: virtual_mijia_lightstrip
        default_entity_id: light.virtual_mijia_lightstrip
        state: "{{ is_state('input_boolean.virtual_mijia_lightstrip_power', 'on') }}"
        level: "{{ (states('input_number.virtual_mijia_lightstrip_brightness') | int(0) * 255 / 100) | int }}"
        turn_on:
          - service: input_boolean.turn_on
            target:
              entity_id: input_boolean.virtual_mijia_lightstrip_power
        turn_off:
          - service: input_boolean.turn_off
            target:
              entity_id: input_boolean.virtual_mijia_lightstrip_power
        set_level:
          - service: input_number.set_value
            target:
              entity_id: input_number.virtual_mijia_lightstrip_brightness
            data:
              value: "{{ (brightness | int(0) * 100 / 255) | round(0) }}"
  - fan:
      - name: 虚拟米家空气净化器
        unique_id: virtual_mijia_air_purifier
        default_entity_id: fan.virtual_mijia_air_purifier
        state: "{{ is_state('input_boolean.virtual_mijia_air_purifier_power', 'on') }}"
        speed_count: 5
        percentage: "{{ states('input_number.virtual_mijia_air_purifier_speed') | int(0) if is_state('input_boolean.virtual_mijia_air_purifier_power', 'on') else 0 }}"
        turn_on:
          - service: input_boolean.turn_on
            target:
              entity_id: input_boolean.virtual_mijia_air_purifier_power
        turn_off:
          - service: input_boolean.turn_off
            target:
              entity_id: input_boolean.virtual_mijia_air_purifier_power
        set_percentage:
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ percentage | int(0) > 0 }}"
                sequence:
                  - service: input_boolean.turn_on
                    target:
                      entity_id: input_boolean.virtual_mijia_air_purifier_power
            default:
              - service: input_boolean.turn_off
                target:
                  entity_id: input_boolean.virtual_mijia_air_purifier_power
          - service: input_number.set_value
            target:
              entity_id: input_number.virtual_mijia_air_purifier_speed
            data:
              value: "{{ percentage | int(0) }}"
  - switch:
      - name: 虚拟小爱音箱场景
        unique_id: virtual_mijia_xiaoai_scene
        default_entity_id: switch.virtual_mijia_xiaoai_scene
        state: "{{ is_state('input_boolean.virtual_mijia_xiaoai_scene_power', 'on') }}"
        turn_on:
          - service: input_boolean.turn_on
            target:
              entity_id: input_boolean.virtual_mijia_xiaoai_scene_power
        turn_off:
          - service: input_boolean.turn_off
            target:
              entity_id: input_boolean.virtual_mijia_xiaoai_scene_power

automation:
  - alias: Virtual Mijia sync desk lamp to Rust bridge
    id: virtual_mijia_sync_desk_lamp
    mode: restart
    trigger:
      - platform: state
        entity_id:
          - input_boolean.virtual_mijia_desk_lamp_power
          - input_number.virtual_mijia_desk_lamp_brightness
          - input_select.virtual_mijia_desk_lamp_color
    condition:
      - condition: state
        entity_id: input_boolean.virtual_mijia_sync_guard
        state: "off"
    action:
      - service: rest_command.virtual_mijia_update
        data:
          device_id: desk_lamp
          on: "{{ is_state('input_boolean.virtual_mijia_desk_lamp_power', 'on') }}"
          brightness: "{{ states('input_number.virtual_mijia_desk_lamp_brightness') | int(0) }}"
          color: >-
            {% set map = {'warm':'#ffd36b','white':'#f8fafc','night':'#f97316'} %}
            {{ map[states('input_select.virtual_mijia_desk_lamp_color')] }}
          note: HA 控制虚拟台灯
  - alias: Virtual Mijia sync lightstrip to Rust bridge
    id: virtual_mijia_sync_lightstrip
    mode: restart
    trigger:
      - platform: state
        entity_id:
          - input_boolean.virtual_mijia_lightstrip_power
          - input_number.virtual_mijia_lightstrip_brightness
          - input_select.virtual_mijia_lightstrip_color
    condition:
      - condition: state
        entity_id: input_boolean.virtual_mijia_sync_guard
        state: "off"
    action:
      - service: rest_command.virtual_mijia_update
        data:
          device_id: lightstrip
          on: "{{ is_state('input_boolean.virtual_mijia_lightstrip_power', 'on') }}"
          brightness: "{{ states('input_number.virtual_mijia_lightstrip_brightness') | int(0) }}"
          color: >-
            {% set map = {'cyan':'#4cc9f0','purple':'#b692ff','sunset':'#fb7185'} %}
            {{ map[states('input_select.virtual_mijia_lightstrip_color')] }}
          note: HA 控制虚拟灯带
  - alias: Virtual Mijia sync purifier to Rust bridge
    id: virtual_mijia_sync_air_purifier
    mode: restart
    trigger:
      - platform: state
        entity_id:
          - input_boolean.virtual_mijia_air_purifier_power
          - input_number.virtual_mijia_air_purifier_speed
    condition:
      - condition: state
        entity_id: input_boolean.virtual_mijia_sync_guard
        state: "off"
    action:
      - service: rest_command.virtual_mijia_update
        data:
          device_id: air_purifier
          on: "{{ is_state('input_boolean.virtual_mijia_air_purifier_power', 'on') }}"
          speed: "{{ states('input_number.virtual_mijia_air_purifier_speed') | int(0) }}"
          brightness: "{{ states('input_number.virtual_mijia_air_purifier_speed') | int(0) }}"
          note: HA 控制虚拟空气净化器
  - alias: Virtual Mijia sync Xiaoai scene to Rust bridge
    id: virtual_mijia_sync_xiaoai_scene
    mode: restart
    trigger:
      - platform: state
        entity_id:
          - input_boolean.virtual_mijia_xiaoai_scene_power
    condition:
      - condition: state
        entity_id: input_boolean.virtual_mijia_sync_guard
        state: "off"
    action:
      - service: rest_command.virtual_mijia_update
        data:
          device_id: xiaoai_scene
          on: "{{ is_state('input_boolean.virtual_mijia_xiaoai_scene_power', 'on') }}"
          brightness: "{{ 100 if is_state('input_boolean.virtual_mijia_xiaoai_scene_power', 'on') else 20 }}"
          note: HA 控制虚拟小爱场景
  - alias: Virtual Mijia sync Rust dashboard to Home Assistant
    id: virtual_mijia_sync_rust_dashboard_to_ha
    mode: queued
    trigger:
      - platform: webhook
        webhook_id: virtual_mijia_bridge_state_b53b516a99ba5cf173601fd8ff7298e0
        allowed_methods:
          - POST
    variables:
      device_id: "{{ trigger.json.id | default('') }}"
      color_value: "{{ trigger.json.color | default('') }}"
    action:
      - service: input_boolean.turn_on
        target:
          entity_id: input_boolean.virtual_mijia_sync_guard
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ device_id == 'desk_lamp' }}"
            sequence:
              - choose:
                  - conditions:
                      - condition: template
                        value_template: "{{ trigger.json.on | default(false) == true }}"
                    sequence:
                      - service: input_boolean.turn_on
                        target:
                          entity_id: input_boolean.virtual_mijia_desk_lamp_power
                default:
                  - service: input_boolean.turn_off
                    target:
                      entity_id: input_boolean.virtual_mijia_desk_lamp_power
              - service: input_number.set_value
                target:
                  entity_id: input_number.virtual_mijia_desk_lamp_brightness
                data:
                  value: "{{ trigger.json.brightness | int(0) }}"
              - service: input_select.select_option
                target:
                  entity_id: input_select.virtual_mijia_desk_lamp_color
                data:
                  option: >-
                    {% if color_value == '#f8fafc' %}white
                    {% elif color_value == '#f97316' %}night
                    {% else %}warm
                    {% endif %}
          - conditions:
              - condition: template
                value_template: "{{ device_id == 'lightstrip' }}"
            sequence:
              - choose:
                  - conditions:
                      - condition: template
                        value_template: "{{ trigger.json.on | default(false) == true }}"
                    sequence:
                      - service: input_boolean.turn_on
                        target:
                          entity_id: input_boolean.virtual_mijia_lightstrip_power
                default:
                  - service: input_boolean.turn_off
                    target:
                      entity_id: input_boolean.virtual_mijia_lightstrip_power
              - service: input_number.set_value
                target:
                  entity_id: input_number.virtual_mijia_lightstrip_brightness
                data:
                  value: "{{ trigger.json.brightness | int(0) }}"
              - service: input_select.select_option
                target:
                  entity_id: input_select.virtual_mijia_lightstrip_color
                data:
                  option: >-
                    {% if color_value == '#b692ff' %}purple
                    {% elif color_value == '#fb7185' %}sunset
                    {% else %}cyan
                    {% endif %}
          - conditions:
              - condition: template
                value_template: "{{ device_id == 'air_purifier' }}"
            sequence:
              - choose:
                  - conditions:
                      - condition: template
                        value_template: "{{ trigger.json.on | default(false) == true }}"
                    sequence:
                      - service: input_boolean.turn_on
                        target:
                          entity_id: input_boolean.virtual_mijia_air_purifier_power
                default:
                  - service: input_boolean.turn_off
                    target:
                      entity_id: input_boolean.virtual_mijia_air_purifier_power
              - service: input_number.set_value
                target:
                  entity_id: input_number.virtual_mijia_air_purifier_speed
                data:
                  value: "{{ trigger.json.speed | int(0) }}"
          - conditions:
              - condition: template
                value_template: "{{ device_id == 'xiaoai_scene' }}"
            sequence:
              - choose:
                  - conditions:
                      - condition: template
                        value_template: "{{ trigger.json.on | default(false) == true }}"
                    sequence:
                      - service: input_boolean.turn_on
                        target:
                          entity_id: input_boolean.virtual_mijia_xiaoai_scene_power
                default:
                  - service: input_boolean.turn_off
                    target:
                      entity_id: input_boolean.virtual_mijia_xiaoai_scene_power
      - delay:
          seconds: 1
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.virtual_mijia_sync_guard

homekit:
  - name: HA Mijia Test
    port: 51827
    advertise_ip:
      - 192.168.3.37
    filter:
      include_entities:
        - light.virtual_mijia_desk_lamp
        - light.virtual_mijia_lightstrip
        - fan.virtual_mijia_air_purifier
        - switch.virtual_mijia_xiaoai_scene
    entity_config:
      fan.virtual_mijia_air_purifier:
        type: air_purifier
